# Release automation via release-plz (https://release-plz.dev).
#
# Two jobs, both on push to the trunk:
#   - release-plz-pr:      opens/updates a "Release PR" that bumps the workspace
#                          version and writes the CHANGELOG. Nothing is published
#                          by this job.
#   - release-plz-release: publishes to crates.io and creates the GitHub Release.
#                          With `release_always = false` (see release-plz.toml) it
#                          ONLY publishes for the commit that merges a Release PR,
#                          so a normal feature merge never triggers a publish.
#
# The human gate is merging the Release PR. Until then, nothing reaches crates.io.
#
# Tokens:
#   - A GitHub App (praxiomlabs-release-plz; Client ID + private key in the
#     RELEASE_PLZ_CLIENT_ID / RELEASE_PLZ_APP_PRIVATE_KEY secrets) mints a short-lived token each run instead of
#     using the default GITHUB_TOKEN, because PRs opened with the default token
#     do NOT trigger CI workflows — the Release PR would sit with zero checks
#     and could never satisfy required status checks. An App (vs a PAT) has no
#     expiry, avoiding the v0.7.0-style silent-token-death failure mode.
#   - CARGO_REGISTRY_TOKEN authenticates the crates.io publish. The planned
#     follow-up (after the first release-plz-driven release is verified) is to
#     switch to crates.io Trusted Publishing (OIDC) via
#     rust-lang/crates-io-auth-action and delete the token secret — at which
#     point the `release` job gains `permissions: id-token: write` and drops the
#     CARGO_REGISTRY_TOKEN env.

name: Release-plz

on:
  push:
    branches: [main]

# Do not run more than one release-plz instance per ref at a time.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLZ_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      # rust-toolchain.toml pins the repo to the MSRV toolchain, which is too
      # old for cargo-semver-checks (0.47 needs rustc >= 1.91; the sspi dep
      # needs >= 1.89). release-plz silently treats a cargo-semver-checks
      # error as "API compatible changes" (release-plz#2294), which produced
      # a patch-bump Release PR (v0.11.1) for an API-breaking main. Force the
      # stable toolchain for release-plz's cargo invocations; CI already
      # builds and tests every commit on stable in the test matrix.
      - name: Use stable toolchain despite the MSRV pin
        run: echo "RUSTUP_TOOLCHAIN=stable" >> "$GITHUB_ENV"
      - name: Run release-plz
        uses: release-plz/action@v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLZ_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      # rust-toolchain.toml pins the repo to the MSRV toolchain, which is too
      # old for cargo-semver-checks (0.47 needs rustc >= 1.91; the sspi dep
      # needs >= 1.89). release-plz silently treats a cargo-semver-checks
      # error as "API compatible changes" (release-plz#2294), which produced
      # a patch-bump Release PR (v0.11.1) for an API-breaking main. Force the
      # stable toolchain for release-plz's cargo invocations; CI already
      # builds and tests every commit on stable in the test matrix.
      - name: Use stable toolchain despite the MSRV pin
        run: echo "RUSTUP_TOOLCHAIN=stable" >> "$GITHUB_ENV"
      - name: Run release-plz
        uses: release-plz/action@v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # release-plz bumps Cargo.toml + CHANGELOG but not the README install
      # snippets (`mssql-client = "X.Y"`), so the doc-consistency gate fails on
      # every Release PR until they are hand-bumped. Sync them automatically on
      # the Release PR branch. Pushing to that branch (never main) re-runs CI
      # but does not re-trigger this workflow, and self-heals on the next main
      # push because this step runs again.
      - name: Sync README dep-version snippets on the Release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # The Release PR branch is always named release-plz-*.
          pr_branch=$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("release-plz-"))][0].headRefName' \
            2>/dev/null || true)
          if [ -z "$pr_branch" ]; then
            echo "No open Release PR; nothing to sync."
            exit 0
          fi
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch "$remote" "$pr_branch"
          git checkout -B "$pr_branch" FETCH_HEAD
          bash scripts/sync-readme-version.sh
          if git diff --quiet; then
            echo "Dep-version snippets already in sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "docs: sync first-party dep version snippets to the release version"
          git push "$remote" "HEAD:$pr_branch"
          echo "Synced dep-version snippets on $pr_branch."
