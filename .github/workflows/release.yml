# Release workflow for rust-mssql-driver
# Includes semver checks before publishing (CI-007)

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  # Verify semver compliance before release (CI-007)
  semver-check:
    name: Semver Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - name: Get previous tag
        id: prev_tag
        run: |
          # Get the tag before the current one
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          verbose: true
          # Use git tag as baseline to avoid workspace dependency issues.
          # When using crates.io baseline, workspace deps get mixed with local versions.
          baseline-rev: ${{ steps.prev_tag.outputs.tag }}
          # Exclude mssql-testing: testing utilities have relaxed API stability
          # requirements and are not published to crates.io (publish = false).
          exclude: mssql-testing

  # Run full test suite before release
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - name: Run tests
        run: cargo nextest run --all-features

  # Security audit before release
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Build documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [semver-check, test, security-audit, docs]
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      # Publish all crates in dependency order with retry logic.
      # Each crate is published with retries to handle crates.io index
      # propagation delays. "Already published" is treated as success.
      - name: Publish all crates
        run: |
          set -euo pipefail

          publish_crate() {
            local crate="$1"
            local max_retries=5
            local delay=15

            for attempt in $(seq 1 "$max_retries"); do
              echo "::group::Publishing $crate (attempt $attempt/$max_retries)"
              output=$(cargo publish -p "$crate" --no-verify 2>&1) && {
                echo "$output"
                echo "::endgroup::"
                echo "✅ $crate published successfully"
                return 0
              }
              echo "$output"
              echo "::endgroup::"

              # Already published — not an error
              if echo "$output" | grep -qi "already uploaded\|already exists"; then
                echo "ℹ️  $crate@$VERSION already published, skipping"
                return 0
              fi

              # Dependency not yet indexed — retry with backoff
              if echo "$output" | grep -qi "failed to select a version\|no matching package"; then
                echo "⏳ Dependency not yet indexed, retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi

              # Transient server error — retry
              if echo "$output" | grep -qi "503\|429\|timed out\|connection refused"; then
                echo "⏳ Transient error, retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi

              # Unknown error — fail immediately
              echo "❌ Failed to publish $crate"
              return 1
            done

            echo "❌ Failed to publish $crate after $max_retries attempts"
            return 1
          }

          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version $VERSION"

          # Tier 0: Independent crates (no internal dependencies)
          publish_crate tds-protocol
          publish_crate mssql-types

          # Tier 1: Depend on tier 0
          publish_crate mssql-tls
          publish_crate mssql-codec
          publish_crate mssql-auth

          # Tier 2: Proc-macro (no internal runtime deps)
          publish_crate mssql-derive

          # Tier 3: Main client
          publish_crate mssql-client

          # Tier 4: Depend on mssql-client
          publish_crate mssql-driver-pool

          echo ""
          echo "🎉 All crates published successfully"

  # Dry run verification - tests all crates in dependency order
  dry-run:
    name: Dry Run Publish
    runs-on: ubuntu-latest
    needs: [semver-check, test, security-audit, docs]
    if: ${{ inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - name: Verify all crates publishable
        run: |
          set -euo pipefail
          failed=0
          for crate in tds-protocol mssql-types mssql-tls mssql-codec mssql-auth mssql-derive mssql-client mssql-driver-pool; do
            echo "Checking $crate..."
            if ! cargo publish -p "$crate" --dry-run --no-verify; then
              echo "❌ $crate failed dry-run"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "❌ Some crates failed dry-run verification"
            exit 1
          fi
          echo "✅ All crates verified for publishing"

  # Create GitHub release
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Try to extract changelog section for this version
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${VERSION}\]/{found=1;next} /^## \[/{found=0} found" CHANGELOG.md > release_notes.md
          else
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
