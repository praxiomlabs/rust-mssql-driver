# Benchmark regression detection for rust-mssql-driver
# Runs benchmarks and compares against baseline to detect performance regressions

name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for non-main refs (PR branches) when a new commit
# arrives. Benchmarks take ~13 minutes; cancelling stale runs saves significant
# CI time without losing signal (baselines are only stored from main anyway).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  # Required for benchmark-action to comment on PRs
  pull-requests: write
  # Required for benchmark-action to push to gh-pages
  contents: write

jobs:
  benchmark:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache the benchmark target directory
          cache-targets: true
          # Only write caches from main so PR runs don't push total Actions cache
          # usage over the 10 GB limit and evict main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Kerberos headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      - name: Run benchmarks
        env:
          # The criterion run phase dominates this job (~600s of ~780s: 56 benches
          # at criterion's default ~3s warm-up + ~5s measurement each). On PRs we
          # only need a regression *signal* against the main baseline, so use
          # reduced sampling (~2.5s/bench). Pushes to main keep full-fidelity
          # timing because that run stores the baseline the comparison uses.
          CRITERION_ARGS: ${{ github.event_name == 'pull_request' && '--warm-up-time 1 --measurement-time 1 --sample-size 10' || '' }}
        run: |
          # Run only criterion benchmark targets with bencher output format
          # Using explicit --bench flags avoids running lib tests which don't understand criterion flags
          # The --output-format bencher flag produces output compatible with the 'cargo' tool type
          cargo bench \
            -p tds-protocol --bench protocol \
            -p mssql-types --bench types \
            -p mssql-client --bench client \
            -- --output-format bencher $CRITERION_ARGS 2>&1 | tee benchmark-output.txt

      # Clean up any changes to Cargo.lock before switching branches
      # The benchmark action needs a clean working directory to switch to gh-pages
      - name: Clean working directory
        run: git checkout -- Cargo.lock || true

      # Store benchmark results on main branch
      - name: Store benchmark result
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          # Store on gh-pages branch
          auto-push: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Don't fail on first run (no baseline yet)
          fail-on-alert: false
          # Comment on commits to main
          comment-on-alert: true
          alert-threshold: '150%'

      # Compare against baseline for PRs
      # Note: This step will fail if gh-pages branch doesn't exist yet.
      # Once the first commit to main runs, the baseline will be established.
      - name: Compare benchmarks (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true  # Allow failure when no baseline exists
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          # Don't push results from PRs
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Don't fail on first run when no baseline exists yet
          fail-on-alert: false
          # Post comparison as PR comment when baseline exists
          comment-on-alert: true
          # Alert if performance degrades by more than 20%
          alert-threshold: '120%'

