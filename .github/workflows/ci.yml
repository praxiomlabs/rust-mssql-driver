# CI pipeline for rust-mssql-driver
# See ARCHITECTURE.md §6.2 for pipeline design rationale

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering from the Actions tab (useful for retrying
  # after transient failures or validating a branch on-demand).
  workflow_dispatch:

# Cancel in-progress runs for non-main branches when a new commit arrives.
# Main always runs to completion so we have a full audit trail per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            # Linux: test all features (Kerberos requires libkrb5-dev)
            features: --all-features
          - os: windows-latest
            # Windows: test default features (integrated-auth requires libgssapi which is Linux-only)
            features: ""
          - os: macos-latest
            # macOS: test default features (integrated-auth requires libgssapi which is Linux-only)
            features: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: ./.github/actions/setup-linux-deps
      - name: Run tests
        run: cargo nextest run ${{ matrix.features }}
      - name: Run doctests
        run: cargo test --doc ${{ matrix.features }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(grep -m1 'rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Check MSRV
        run: cargo check --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Build examples
        run: cargo build --examples --all-features

  miri:
    name: Miri (unsafe code detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Setup Miri
        run: cargo +nightly miri setup
      - name: Run Miri on tds-protocol
        # Only tds-protocol is tested under Miri. The only other unsafe code
        # is in mssql-auth/windows_certstore.rs (Windows FFI, not Miri-testable).
        run: cargo +nightly miri test -p tds-protocol

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    # Only run on PRs to catch breaking changes before merge
    if: github.event_name == 'pull_request'
    # Advisory for pre-1.0: semver spec allows breaking changes in 0.x minor versions
    # This check warns but doesn't block PRs until we reach 1.0
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-linux-deps
      - name: Get latest release tag
        id: latest_tag
        run: |
          # Get the latest release tag for baseline comparison
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # Use git tag as baseline to avoid workspace dependency issues.
          # When using crates.io baseline, workspace deps get mixed with local versions.
          baseline-rev: ${{ steps.latest_tag.outputs.tag }}
          # Exclude mssql-testing: testing utilities have relaxed API stability
          # requirements and are not published to crates.io (publish = false).
          exclude: mssql-testing

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/setup-linux-deps
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: ./.github/actions/setup-linux-deps
      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C 2>/dev/null; then
              echo "SQL Server is ready"
              break
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 2
          done
      - name: Run integration tests
        # Run with all features to test full functionality
        run: cargo nextest run --all-features
        env:
          MSSQL_HOST: localhost
          MSSQL_PORT: 1433
          MSSQL_USER: sa
          MSSQL_PASSWORD: YourStrong@Passw0rd

  feature-flags:
    name: Feature Flag Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      - name: Validate feature flag combinations
        run: cargo xtask check-features
      - name: Run feature-specific tests
        run: |
          echo "Running zeroize feature tests..."
          cargo test -p mssql-auth --features zeroize -- credentials::tests

          echo "Running otel feature tests..."
          cargo test -p mssql-client --features otel --lib -- instrumentation::tests

          echo "Feature-specific tests passed!"

  # Verifies every publishable crate can be packaged with its published-manifest
  # dependency requirements resolvable — the exact check that would have caught
  # the v0.11.0 mid-publish failure (a versioned dev-dependency cycle) before
  # the merge button existed. Runs cargo's own publish-time validation without
  # uploading anything.
  publish-dry-run:
    name: Publish Dry-Run (packaging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-linux-deps
      - name: Dry-run package all publishable crates
        run: |
          set -euo pipefail
          for crate in tds-protocol mssql-types mssql-tls mssql-codec mssql-auth mssql-derive mssql-client mssql-driver-pool; do
            echo "::group::$crate"
            cargo publish -p "$crate" --dry-run --no-verify
            echo "::endgroup::"
          done

  hygiene:
    name: Hygiene (typos, unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install typos and cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli,cargo-machete
      - name: Spell check
        run: typos
      - name: Unused dependency check
        run: cargo machete

  adr-011-mod-rs:
    name: ADR-011 (no mod.rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbid mod.rs files (ADR-011)
        run: |
          if find crates xtask -name mod.rs -not -path '*/target/*' | grep -q .; then
            echo "::error::ADR-011 violation: mod.rs files are banned. Use file-alongside modules (foo.rs + foo/)."
            find crates xtask -name mod.rs -not -path '*/target/*'
            exit 1
          fi
          echo "No mod.rs files found (ADR-011 compliant)."

  doc-consistency:
    name: Doc Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check documentation consistency
        run: bash scripts/check-doc-consistency.sh

  commit-branding:
    name: No AI Branding in Commits
    # PR-only: needs a base..head commit range. History is permanent, so this
    # guards forward against reintroducing AI co-author/branding trailers.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject AI co-author / branding trailers
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git log --format='%B' "$base..$head" \
              | grep -iE 'co-authored-by:.*(claude|anthropic|openai|chatgpt|copilot|gpt-)'; then
            echo "::error::AI-branding trailer found in a PR commit message. Remove it (see CONTRIBUTING.md -> AI-Assisted Contributions)."
            exit 1
          fi
          echo "No AI-branding trailers in PR commit range."
