# CI pipeline for rust-mssql-driver
# See ARCHITECTURE.md §6.2 for pipeline design rationale

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual triggering from the Actions tab (useful for retrying
  # after transient failures or validating a branch on-demand).
  workflow_dispatch:

# Cancel in-progress runs for non-main branches when a new commit arrives.
# Main always runs to completion so we have a full audit trail per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Trim debuginfo in CI builds: ~10% faster compile and ~39% smaller target dir,
  # which shrinks rust-cache entries and compounds the save-if cache fix. line-tables
  # keeps file/line backtraces. Set via env (not Cargo.toml) so local debugging keeps
  # full debuginfo.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            # Linux: test all features (Kerberos requires libkrb5-dev)
            features: --all-features
          - os: windows-latest
            # Windows: test default features (integrated-auth requires libgssapi which is Linux-only)
            features: ""
          - os: macos-latest
            # macOS: test default features (integrated-auth requires libgssapi which is Linux-only)
            features: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - uses: ./.github/actions/setup-linux-deps
      - name: Run tests
        run: cargo nextest run ${{ matrix.features }}
      - name: Run doctests
        run: cargo test --doc ${{ matrix.features }}
      - name: Build & test Windows-only features
        # sspi-auth, filestream, and windows-certstore never compile on the
        # Linux --all-features leg, so without this step they bit-rot
        # silently (the #148 class: a dep bump broke sspi-auth and no CI
        # job noticed). This runs on stable; MSRV compatibility of these
        # features is tracked separately in #148.
        if: matrix.os == 'windows-latest'
        run: cargo nextest run -p mssql-client -p mssql-auth --features mssql-client/sspi-auth,mssql-client/filestream,mssql-auth/windows-certstore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(grep -m1 'rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Check MSRV
        run: cargo check --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Build examples
        run: cargo build --examples --all-features

  api-self-containment:
    name: API Self-Containment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Build the api-smoke guard
        # api-smoke depends ONLY on mssql-client (not the internal crates), so
        # this fails to compile if any public entry point — including derive
        # macro output — needs a direct dependency on an internal crate.
        run: cargo build -p api-smoke

  miri:
    name: Miri (unsafe code detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Setup Miri
        run: cargo +nightly miri setup
      - name: Run Miri on tds-protocol
        # Only tds-protocol is tested under Miri — a deliberate scope, not
        # an oversight: it is the crate that parses untrusted bytes. The
        # only other unsafe code in the workspace is Windows FFI
        # (mssql-auth/windows_certstore.rs, mssql-client/filestream.rs),
        # which Miri cannot execute. mssql-types and mssql-codec contain
        # zero unsafe code, and their suites lean on proptest and tokio
        # duplex I/O, both of which Miri handles poorly for little
        # detection value.
        run: cargo +nightly miri test -p tds-protocol

  fuzz-smoke:
    name: Fuzz Smoke (wire parsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz each target briefly
        # Short per-target budget: this is a smoke test that the parsers
        # don't crash on shallow hostile inputs and that the targets keep
        # building. Long fuzzing runs stay local/manual.
        #
        # set -euo pipefail + an explicit empty-list check are load-bearing:
        # the previous `for target in $(cargo fuzz list)` form swallowed a
        # failed install/list (empty substitution -> loop never runs -> exit
        # 0), making the job pass while fuzzing nothing.
        run: |
          set -euo pipefail
          mapfile -t targets < <(cargo +nightly fuzz list)
          if [ "${#targets[@]}" -eq 0 ]; then
            echo "::error::cargo fuzz list returned no targets"
            exit 1
          fi
          echo "Fuzzing ${#targets[@]} targets: ${targets[*]}"
          # Pin the gnu target: recent cargo-fuzz defaults to
          # x86_64-unknown-linux-musl, which isn't installed on the runner
          # (and would pull in musl static-linking issues for mssql-client's
          # C deps). gnu is always present and is what these targets are
          # validated against.
          for target in "${targets[@]}"; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run --target x86_64-unknown-linux-gnu "$target" \
              -- -max_total_time=15 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    # Only run on PRs to catch breaking changes before merge
    if: github.event_name == 'pull_request'
    # Advisory for pre-1.0: semver spec allows breaking changes in 0.x minor versions
    # This check warns but doesn't block PRs until we reach 1.0
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-linux-deps
      - name: Get latest release tag
        id: latest_tag
        run: |
          # Get the latest release tag for baseline comparison
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      # cargo-semver-checks builds each crate in a TEMP project with FRESH
      # dependency resolution — Cargo.lock is not consulted on either side
      # (verified in #202). A new release of any transitive dep can therefore
      # break this job while every lockfile-honoring build stays green:
      # time 0.3.48 (published 2026-06-12) conflicts with picky-asn1 0.10.1
      # (E0119) and broke the mssql-auth check exactly that way. Hence the
      # split below: crates whose optional features pull the fragile
      # sspi/picky/time or azure/time dep trees are checked WITHOUT those
      # features; every other crate with all features. Revisit the split when
      # upstream resolves the conflict.
      #
      # The azure-identity exclusions on mssql-client / mssql-driver-pool are
      # LOSSLESS for semver purposes: that feature gates no public items in
      # either crate (it only forwards to mssql-auth, whose azure surface is
      # outside its default-features leg anyway). If a future feature DOES
      # gate public client/pool API, add it to the `features` lists below or
      # it will not be semver-checked.
      #
      # KNOWN BLIND SPOT regardless of configuration: return-type changes
      # pass undetected (reproduced in #202 on cargo-semver-checks 0.42 and
      # verified again on 0.48.0), so
      # commit-message breaking markers and Release-PR verification
      # (CLAUDE.md) remain the primary guards.
      - name: Semver check (all features, crates without fragile dep trees)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # Use git tag as baseline to avoid workspace dependency issues.
          # When using crates.io baseline, workspace deps get mixed with local versions.
          baseline-rev: ${{ steps.latest_tag.outputs.tag }}
          # Exclude mssql-testing: testing utilities have relaxed API stability
          # requirements and are not published to crates.io (publish = false).
          exclude: mssql-testing,mssql-auth,mssql-client,mssql-driver-pool
          # Pinned for reproducibility — the action otherwise floats on
          # latest stable (ignoring rust-toolchain.toml). Bump deliberately.
          rust-toolchain: "1.92.0"
          feature-group: all-features
      - name: Semver check (mssql-client, all features except azure-identity)
        # Run even when an earlier leg fails — a red leg must not mask the
        # findings of the others (bitten on PR #210, where the aborted
        # all-features leg hid the mssql-auth report).
        if: ${{ !cancelled() }}
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ steps.latest_tag.outputs.tag }}
          package: mssql-client
          rust-toolchain: "1.92.0"
          # Defaults (chrono, uuid, decimal, encoding, tls, derive) plus every
          # optional feature except azure-identity (azure/time tree) and
          # fuzzing (internal hooks, not public API).
          feature-group: default-features
          features: json,otel,zeroize,always-encrypted,integrated-auth,sspi-auth,filestream
      - name: Semver check (mssql-driver-pool, all features except azure-identity)
        if: ${{ !cancelled() }}
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ steps.latest_tag.outputs.tag }}
          package: mssql-driver-pool
          rust-toolchain: "1.92.0"
          feature-group: default-features
          features: otel,integrated-auth,sspi-auth,filestream
      - name: Semver check (mssql-auth, default features)
        if: ${{ !cancelled() }}
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ steps.latest_tag.outputs.tag }}
          package: mssql-auth
          rust-toolchain: "1.92.0"
          # default = [] for mssql-auth: checks the core API surface without
          # the optional dep trees that fresh resolution keeps breaking.
          feature-group: default-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: ./.github/actions/setup-linux-deps
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  integration:
    name: Integration Tests (${{ matrix.mssql_version }})
    runs-on: ubuntu-latest
    strategy:
      # Run every version to completion: a failure on one must not mask the
      # others. The aggregate gate below reports the combined result.
      fail-fast: false
      matrix:
        mssql_version: ['2017-latest', '2019-latest', '2022-latest']
        include:
          # SQL Server 2017 predates UTF-8 collations (a 2019+ feature), so
          # the UTF-8 round-trip test cannot run there. Exclude it from the
          # 2017 leg only; it runs with full assertions on 2019/2022. This is
          # explicit scoping of a version-specific test, not a silent skip.
          - mssql_version: '2017-latest'
            extra_exclude: ' and not test(test_utf8_varchar_decoding)'
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:${{ matrix.mssql_version }}
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        # Version-agnostic health check: 2019/2022 ship /opt/mssql-tools18
        # (which needs -C to trust the self-signed cert), 2017 ships the older
        # /opt/mssql-tools. Try the new path, fall back to the old one.
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      - uses: ./.github/actions/setup-linux-deps
      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            if /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C 2>/dev/null; then
              echo "SQL Server is ready"
              break
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 2
          done
      - name: Run integration tests
        # Live tests are #[ignore]d, so the plain `nextest run` this job used
        # to invoke ran zero of them while the SQL Server container idled.
        # Run ONLY the ignored set here (non-ignored tests are covered by the
        # Test matrix). Tests that need infrastructure CI lacks (Azure SQL,
        # Azure identity, client certificates, a Kerberos KDC) are excluded
        # explicitly; they still fail loudly when run locally without
        # configuration.
        run: >-
          cargo nextest run --all-features --run-ignored ignored-only
          --no-fail-fast
          -E 'not (binary(azure_sql) or test(azure_identity_auth) or test(cert_auth) or binary(kerberos_live))${{ matrix.extra_exclude }}'
        env:
          MSSQL_HOST: localhost
          MSSQL_PORT: 1433
          MSSQL_USER: sa
          MSSQL_PASSWORD: YourStrong@Passw0rd

  # Branch protection requires a single "Integration Tests" status check, but
  # the job above now fans out one leg per SQL Server version. This aggregate
  # collapses the matrix back into that one required context: it passes only if
  # every version leg passed. Without it, matrixing would rename the required
  # check and block all PRs.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [integration]
    if: always()
    steps:
      - name: Require all SQL Server version legs to pass
        run: |
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::an integration leg failed (result: ${{ needs.integration.result }})"
            exit 1
          fi
          echo "All SQL Server version integration legs passed."

  feature-flags:
    name: Feature Flag Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      - name: Validate feature flag combinations
        run: cargo xtask check-features
      - name: Run feature-specific tests
        run: |
          echo "Running zeroize feature tests..."
          cargo test -p mssql-auth --features zeroize -- credentials::tests

          echo "Running otel feature tests..."
          cargo test -p mssql-client --features otel --lib -- instrumentation::tests

          echo "Feature-specific tests passed!"

  # Verifies every publishable crate can be packaged with its published-manifest
  # dependency requirements resolvable — the exact check that would have caught
  # the v0.11.0 mid-publish failure (a versioned dev-dependency cycle) before
  # the merge button existed. Runs cargo's own publish-time validation without
  # uploading anything.
  publish-dry-run:
    name: Publish Dry-Run (packaging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Only write caches from main. PRs restore main's cache but never save
          # their own ~4 GB of per-PR entries, which were pushing total usage over
          # the 10 GB Actions limit and LRU-evicting main's caches (cache thrashing).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-linux-deps
      # Registry-independent invariant guarding the v0.11.0 incident directly:
      # no published crate may carry a versioned first-party dev/build-dependency.
      # Holds identically on release PRs, where the per-crate dry-run below cannot.
      - name: Check publish invariants
        run: bash scripts/check-publish-invariants.sh
      # Workspace-aware dry-run: resolves sibling crates from the local workspace
      # instead of crates.io, so it validates packaging + ordered dependency
      # resolution even on release PRs whose versions are bumped ahead of the
      # index. The old per-crate `cargo publish -p ... --dry-run` loop could not:
      # downstream crates failed to resolve the just-bumped, not-yet-published
      # first-party versions (the cause of the v0.11.1 Release PR CI failure).
      - name: Workspace publish dry-run
        # rust-toolchain.toml pins 1.88, but `cargo publish --workspace` is stable
        # only on cargo >= 1.90. Override to the installed stable for this step
        # (this is packaging validation, not an MSRV check — the msrv job covers 1.88).
        env:
          RUSTUP_TOOLCHAIN: stable
        run: cargo publish --workspace --dry-run --no-verify --exclude mssql-testing

  hygiene:
    name: Hygiene (typos, unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install typos and cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli,cargo-machete
      - name: Spell check
        run: typos
      - name: Unused dependency check
        run: cargo machete

  adr-011-mod-rs:
    name: ADR-011 (no mod.rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Forbid mod.rs files (ADR-011)
        run: |
          if find crates xtask -name mod.rs -not -path '*/target/*' | grep -q .; then
            echo "::error::ADR-011 violation: mod.rs files are banned. Use file-alongside modules (foo.rs + foo/)."
            find crates xtask -name mod.rs -not -path '*/target/*'
            exit 1
          fi
          echo "No mod.rs files found (ADR-011 compliant)."

  doc-consistency:
    name: Doc Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check documentation consistency
        run: bash scripts/check-doc-consistency.sh

  commit-branding:
    name: No AI Branding in Commits
    # PR-only: needs a base..head commit range. History is permanent, so this
    # guards forward against reintroducing AI co-author/branding trailers.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject AI co-author / branding trailers
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git log --format='%B' "$base..$head" \
              | grep -iE 'co-authored-by:.*(claude|anthropic|openai|chatgpt|copilot|gpt-)'; then
            echo "::error::AI-branding trailer found in a PR commit message. Remove it (see CONTRIBUTING.md -> AI-Assisted Contributions)."
            exit 1
          fi
          echo "No AI-branding trailers in PR commit range."

  commit-breaking-markers:
    name: Breaking-Marker Hygiene
    # PR-only: needs a base..head commit range. release-plz derives versions
    # from commit messages, and a body line like "BREAKING: ..." is NOT a
    # conventional-commits marker — it is silently ignored, which is exactly
    # how the v0.13.2 under-bump happened (#202). Fail loudly instead.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Reject BREAKING body lines that release-plz would ignore
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          bad=0
          for sha in $(git rev-list --no-merges "$base..$head"); do
            subject=$(git log -1 --format='%s' "$sha")
            body=$(git log -1 --format='%b' "$sha")
            # Real markers: `!` before the subject colon, or a
            # `BREAKING CHANGE:` / `BREAKING-CHANGE:` footer line.
            if grep -qE '^BREAKING' <<<"$body" \
              && ! grep -qE '^BREAKING[- ]CHANGE:' <<<"$body" \
              && ! grep -qE '^[a-z]+(\([^)]*\))?!:' <<<"$subject"; then
              echo "::error::Commit $sha ('$subject') has a BREAKING body line that release-plz ignores. Use 'type!:' in the subject or a 'BREAKING CHANGE:' footer (or rephrase the line)."
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "No ignored BREAKING body lines in PR commit range."
