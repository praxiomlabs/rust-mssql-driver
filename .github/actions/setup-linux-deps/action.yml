name: 'Setup Linux Dependencies'
description: 'Install platform-specific build dependencies (libkrb5-dev for Kerberos/SPNEGO auth)'

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
